name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', testbench: '^9.0', laravel: '11' }
          - { php: '8.3', testbench: '^9.0', laravel: '11' }
          - { php: '8.2', testbench: '^10.0', laravel: '12' }
          - { php: '8.3', testbench: '^10.0', laravel: '12' }
          - { php: '8.3', testbench: '^11.0', laravel: '13' }

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, intl, json, mbstring
          coverage: none

      - name: Install dependencies
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction --dev
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
